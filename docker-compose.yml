services:
  taildrop-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: taildrop-app
    ports:
      - "3000:3000"
    volumes:
      - /var/run/tailscale/tailscaled.sock:/var/run/tailscale/tailscaled.sock
      - ~/Downloads/Taildrop:/app/received
    restart: unless-stopped
